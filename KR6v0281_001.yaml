body:
  text: 夫四葙無常三有邃故須彌至高為劫火焰熾海淵深為七日乾竭況閻浮形像理在難固竊見城南面有故塔一區基損壞窗戶崩缺磚石分而信心哲人嚴桃校歎圖之狼藉靈塔之敗故率宗眷援及四有鄉異人同心共修此善樂聖容內外俱就藉茲微上為皇帝下及含氣見眷屬一時成佛維大齊河清二年歲次癸未正月寅八日癸未建北堪主持節軍右金紫光祿大都督假建威將軍員外奉朝請正都寇南新安二縣令鞏虎頭邑主將軍員外奉朝請騎兵娜嚴壽都光明主輔國將軍城羅柵防境都督韓察東堪主成洪義修故主假陰郡承伯齊主成嵩義光明主郭忠光明主楊元明比丘法融比丘比丘唯那楊延壽唯那楊元璨比丘僧暉邑子嚴邑子嚴龍潤邑子董始敬邑子光國邑尚邑子孫元顯邑子嚴文崇邑子嚴尚邑子嚴元通邑子嚴子熾邑邑子侯邑子邑子韋遵貴邑子韓光邑邑子嚴慶邑子李晟維邑子嚴長貴邑子董定城邑子比丘尼道勝比丘尼惠超比丘尼塔主楊洪暉清信陳敬始令清信侯娥寂清信閻向令洪妃清信陳外嬰清清信馬妙姜
